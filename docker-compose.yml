services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-support_readiness}
      POSTGRES_USER: ${POSTGRES_USER:-support_readiness}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in a local .env file}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: [".venv/bin/python", "-m", "apps.api.app.migrations"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-support_readiness}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in a local .env file}@postgres:5432/${POSTGRES_DB:-support_readiness}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      AUTO_CREATE_SCHEMA: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-support_readiness}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in a local .env file}@postgres:5432/${POSTGRES_DB:-support_readiness}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://127.0.0.1:3000}
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - .venv/bin/python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=2)"
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "127.0.0.1:8000:8000"
    read_only: true
    tmpfs:
      - /tmp

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:8000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  postgres-data:
